Do not statically link with Curl and OpenSSL.  This also removes
the openssl-src dependency.

--- Cargo.toml.orig	2026-06-11 13:24:56 UTC
+++ Cargo.toml
@@ -136,7 +136,7 @@ windows-sys = { version = "0.59.0", features = ["Win32
 # Use static curl/SSL on non-macOS platforms
 # We link dynamically on macOS; that way we can support self-signed certificates
 # trusted in the macOS keychain.
-[target."cfg(not(target_os = \"macos\"))".dependencies]
+[target."cfg(not(any(target_os = \"macos\", target_os = \"freebsd\")))".dependencies]
 curl = { version = "0.4.46", features = ["static-curl", "static-ssl"] }
 
 # We optimize the release build for size.
