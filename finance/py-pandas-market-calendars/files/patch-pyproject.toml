-- Reduce setuptools requirement to work with FreeBSD ports setuptools version
-- The package requires setuptools >= 77.0.3 but FreeBSD ports only has 63.1.0
-- Lowering to 60.0.0 which should be sufficient

--- pyproject.toml.orig	2026-04-29 09:58:30.359874000 -0700
+++ pyproject.toml	2026-04-29 09:58:30.360755000 -0700
@@ -26,7 +26,7 @@
 ]
 
 [build-system]
-requires = ["setuptools >= 77.0.3"]
+requires = ["setuptools >= 60.0.0"]
 build-backend = "setuptools.build_meta"
 
 [tool.setuptools]
