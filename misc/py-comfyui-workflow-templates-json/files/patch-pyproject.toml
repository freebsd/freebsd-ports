-- Fix the project.license field so it conforms to PEP 621.
-- The upstream sdist uses the bare string "MIT", which modern setuptools
-- rejects as ambiguous (it must be {text = "MIT"} or {file = "..."}).
-- This is needed for the PEP 517 build to succeed on FreeBSD.
--- pyproject.toml.orig	2026-06-28 07:36:30 UTC
+++ pyproject.toml
@@ -8,7 +8,7 @@ requires-python = ">=3.9"
 description = "Workflow template JSON definitions for ComfyUI"
 readme = {text = "Workflow template JSON definitions for ComfyUI.", content-type = "text/plain"}
 requires-python = ">=3.9"
-license = "MIT"
+license = {text = "MIT"}

 [tool.setuptools.packages.find]
 where = ["src"]
